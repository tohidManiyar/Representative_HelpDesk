<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4caf50, #2e7d32);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        border: none;
        border-radius: 5px;
        background: #4caf50;
        color: white;
        font-size: 15px;
        cursor: pointer;
      }

      button:hover {
        background: #388e3c;
      }

      .message {
        margin-top: 15px;
        text-align: center;
        font-size: 14px;
      }

      .error {
        color: red;
      }

      .success {
        color: green;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Reset Password</h2>

      <input type="password" id="newPassword" placeholder="New Password" />
      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
      />

      <button onclick="resetPassword()">Update Password</button>

      <div class="message" id="message"></div>
    </div>

    <script>
      const resetPassword = async () => {
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;
        const messageBox = document.getElementById("message");

        messageBox.innerHTML = "";
        messageBox.className = "message";

        if (!newPassword || !confirmPassword) {
          messageBox.innerHTML = "Please fill all fields";
          messageBox.classList.add("error");
          return;
        }

        if (newPassword !== confirmPassword) {
          messageBox.innerHTML = "Passwords do not match";
          messageBox.classList.add("error");
          return;
        }

        // ✅ Get token from query parameter
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
          messageBox.innerHTML = "Invalid or missing token";
          messageBox.classList.add("error");
          return;
        }

        try {
          const response = await fetch(
            `http://localhost:8000/api/user/reset-password/${token}`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ newPassword }),
            },
          );

          const data = await response.json();

          if (data.success) {
            messageBox.innerHTML = "Password updated successfully!";
            messageBox.classList.add("success");

            // Optional redirect after 2 seconds
            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          } else {
            messageBox.innerHTML = data.message;
            messageBox.classList.add("error");
          }
        } catch (error) {
          messageBox.innerHTML = "Something went wrong";
          messageBox.classList.add("error");
        }
      };
    </script>
  </body>
</html>
