<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlistz Representative Register</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>

  <!-- Logo -->
  <div class="logo-container">
    <img src="Wishlistz_Small_Logo.jpeg" alt="Wishlistz Logo" class="logo">
  </div>

  <!-- Register Form -->
  <div class="signin-container">
    <h2>Representative Registration</h2>
    <form id="registerForm" method="post">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter Full Name" required>
      </div>

      <div class="form-group">
        <label for="email">Email ID</label>
        <input type="email" id="email" name="email" placeholder="Enter Email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <input type="text" id="role" name="role" placeholder="Enter Role" required>
      </div>

      <div class="form-group">
        <label for="id">Employee ID</label>
        <input type="text" id="id" name="id" placeholder="Enter Employee ID" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter Phone Number" required>
      </div>

      <div class="form-group">
        <label for="shift">Shift</label>
        <input type="text" id="shift" name="shift" placeholder="Enter Shift" required>
      </div>

      <div class="form-group full-width">
        <label for="address">Address</label>
        <textarea id="address" name="address" placeholder="Enter Address" rows="3" required></textarea>
      </div>

      <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" name="city" placeholder="Enter City" required>
      </div>

      <div class="form-group">
        <label for="state">State</label>
        <input type="text" id="state" name="state" placeholder="Enter State" required>
      </div>

      <button type="submit" class="signin-btn">Register</button>
    </form>
  </div>

  <!-- Registration Success Popup -->
  <div id="registerSuccessPopup" class="popup-overlay hidden">
    <div class="popup-box">
      <h3>Registration Successful</h3>
      <p>Your account has been created successfully.</p>
      <button id="goToLogin" class="popup-btn">Log In</button>
    </div>
  </div>

  <script src="register.js"></script>

</body>
</html>
